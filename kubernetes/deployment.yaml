apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-secure
  namespace: secure-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false

        ports:
        - containerPort: 80
